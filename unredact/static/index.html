<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unredact</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>UNREDACT</h1>
    <p class="subtitle">Epstein Files Redaction Analysis</p>
  </header>

  <main>
    <section id="upload-section">
      <div id="drop-zone">
        <p>Drop a PDF here or click to upload</p>
        <input type="file" id="file-input" accept=".pdf" hidden>
      </div>
    </section>

    <section id="viewer-section" hidden>
      <div id="controls">
        <button id="prev-page" disabled>&lt; Prev</button>
        <span id="page-info">Page 1 / 1</span>
        <button id="next-page" disabled>Next &gt;</button>
        <span class="controls-sep"></span>
        <button id="zoom-out">-</button>
        <span id="zoom-level">100%</span>
        <button id="zoom-in">+</button>
        <button id="zoom-fit">Fit</button>
      </div>

      <div id="workspace">
        <div id="left-panel">
          <button id="detect-btn" disabled>Detect Redactions</button>
          <div id="redaction-list"></div>
        </div>

        <div id="right-panel">
          <div id="font-toolbar" hidden>
            <label>
              Font
              <select id="font-select"></select>
            </label>
            <span class="toolbar-sep"></span>
            <div class="size-control">
              <span>Size</span>
              <button id="size-down" class="tb-btn">-</button>
              <input type="range" id="size-slider" min="8" max="120" step="1">
              <button id="size-up" class="tb-btn">+</button>
              <span id="size-value">32</span>px
            </div>
            <span class="toolbar-sep"></span>
            <div class="pos-control">
              <span>Pos</span>
              <div class="dpad">
                <button id="pos-up" class="tb-btn dpad-up">&#9650;</button>
                <div class="dpad-mid">
                  <button id="pos-left" class="tb-btn">&#9664;</button>
                  <span id="pos-display" class="pos-display">0, 0</span>
                  <button id="pos-right" class="tb-btn">&#9654;</button>
                </div>
                <button id="pos-down" class="tb-btn dpad-down">&#9660;</button>
              </div>
              <button id="pos-reset" class="tb-btn" style="font-size:0.65rem">Reset</button>
            </div>
            <span class="toolbar-sep"></span>
            <div class="gap-control">
              <span>Gap</span>
              <button id="gap-down" class="tb-btn">-</button>
              <span id="gap-value">0</span>px
              <button id="gap-up" class="tb-btn">+</button>
            </div>
          </div>
          <div id="popover" hidden>
            <div class="popover-header">
              <span class="popover-title">Analyze Redaction</span>
              <button id="popover-close" class="popover-close-btn">X</button>
            </div>
            <div class="solve-controls">
              <label>
                Mode
                <select id="solve-mode">
                  <option value="name" selected>Name</option>
                  <option value="full_name">Full Name</option>
                  <option value="email">Email</option>
                  <option value="enumerate">Enumerate</option>
                </select>
              </label>
              <label>
                Charset
                <select id="solve-charset">
                  <option value="lowercase">lowercase</option>
                  <option value="uppercase">UPPERCASE</option>
                  <option value="capitalized">Capitalized</option>
                </select>
              </label>
              <label>
                Tolerance
                <input type="range" id="solve-tolerance" min="0" max="5" step="0.5" value="0">
                <span id="solve-tol-value">0</span>px
              </label>
              <label id="filter-label" hidden>
                Word filter
                <select id="solve-filter">
                  <option value="none">None</option>
                  <option value="words">English words</option>
                  <option value="names">Names</option>
                  <option value="both">Words + Names</option>
                </select>
              </label>
              <label>
                Known start
                <input type="text" id="solve-known-start" placeholder="e.g. j" spellcheck="false" autocomplete="off">
              </label>
              <label>
                Known end
                <input type="text" id="solve-known-end" placeholder="e.g. son" spellcheck="false" autocomplete="off">
              </label>
            </div>
            <div class="solve-actions">
              <button id="solve-start" class="solve-btn">Solve</button>
              <button id="solve-stop" class="solve-btn" hidden>Stop</button>
              <button id="solve-accept" class="solve-btn accept" hidden>Accept</button>
              <span id="solve-status"></span>
            </div>
            <div id="solve-results"></div>
          </div>
          <div id="doc-container">
            <img id="doc-image" alt="Document page">
            <canvas id="overlay-canvas"></canvas>
          </div>
          <div id="text-edit-bar" hidden>
            <input type="text" id="left-text-input" class="seg-input" spellcheck="false" autocomplete="off" placeholder="left text">
            <span id="redaction-marker" class="redaction-marker">???</span>
            <input type="text" id="right-text-input" class="seg-input" spellcheck="false" autocomplete="off" placeholder="right text">
            <button id="text-reset" class="tb-btn" title="Reset to OCR">Reset</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="toast-container"></div>
  <script type="module" src="/static/main.js"></script>
</body>
</html>
